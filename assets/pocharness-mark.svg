<svg width="240" height="240" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PoCHarness mark">
  <g fill="none" stroke="#16202E" stroke-width="2.4" stroke-linecap="butt" stroke-linejoin="miter">
    <!-- corner brackets: frame with centred gap on each edge -->
    <path d="M20 43 L20 20 L43 20"/>
    <path d="M57 20 L80 20 L80 43"/>
    <path d="M80 57 L80 80 L57 80"/>
    <path d="M43 80 L20 80 L20 57"/>
  </g>
  <!-- crosshair hairlines -->
  <g stroke="#16202E" stroke-width="1.3" stroke-linecap="butt">
    <line x1="50" y1="37" x2="50" y2="45"/>
    <line x1="50" y1="55" x2="50" y2="63"/>
    <line x1="37" y1="50" x2="45" y2="50"/>
    <line x1="55" y1="50" x2="63" y2="50"/>
  </g>
  <!-- target hit -->
  <circle cx="50" cy="50" r="2.4" fill="#C0392C"/>
</svg>
