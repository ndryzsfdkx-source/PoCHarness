<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="PoCHarness — Engineering Agent Harnesses for Agentic Vulnerability PoC Generation, ICSE 2027">
  <!-- Background baked in (not theme-dependent) so the banner is legible on both GitHub light and dark. -->
  <rect x="0" y="0" width="1200" height="300" rx="20" fill="#16202E"/>

  <!-- mark: corner brackets + crosshair + target hit, recoloured for dark background -->
  <g transform="translate(130,60) scale(1.8)">
    <g fill="none" stroke="#F5F7FA" stroke-width="2.4" stroke-linecap="butt" stroke-linejoin="miter">
      <path d="M20 43 L20 20 L43 20"/>
      <path d="M57 20 L80 20 L80 43"/>
      <path d="M80 57 L80 80 L57 80"/>
      <path d="M43 80 L20 80 L20 57"/>
    </g>
    <g stroke="#F5F7FA" stroke-width="1.3" stroke-linecap="butt">
      <line x1="50" y1="37" x2="50" y2="45"/>
      <line x1="50" y1="55" x2="50" y2="63"/>
      <line x1="37" y1="50" x2="45" y2="50"/>
      <line x1="55" y1="50" x2="63" y2="50"/>
    </g>
    <circle cx="50" cy="50" r="2.4" fill="#C0392C"/>
  </g>

  <!-- wordmark: PoC bold + Harness light, system fonts only -->
  <text x="310" y="172" font-family="'Helvetica Neue', Arial, sans-serif" font-size="72" fill="#F5F7FA">
    <tspan font-weight="700" letter-spacing="-1">PoC</tspan><tspan font-weight="300" dx="10">Harness</tspan>
  </text>

  <!-- subtitle: textLength pins the render width so it can't overflow the
       canvas regardless of which system font the viewer substitutes -->
  <text x="600" y="248" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="20" fill="#93A2B8" textLength="980" lengthAdjust="spacingAndGlyphs">Engineering Agent Harnesses for Agentic Vulnerability PoC Generation</text>
  <text x="600" y="274" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="16" letter-spacing="1.5" fill="#5C6B82">ICSE 2027</text>
</svg>
